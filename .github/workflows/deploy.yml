name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - VERSION

jobs:
  lint:
    name: Lint & syntax check
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy on ${{ matrix.runner }}
    needs: lint
    runs-on: ${{ matrix.runner }}

    # RUNNER_LABELS is a repo variable (not secret) — JSON array of unique
    # runner labels, one per LXC host. Each label is set when registering the
    # runner on that host (see setup.sh).
    # Example: ["version-monitor-lxc1", "version-monitor-lxc2"]
    # Falls back to ["self-hosted"] if not set (single-host setup).
    strategy:
      matrix:
        runner: ${{ fromJson(vars.RUNNER_LABELS || '["self-hosted"]') }}
      fail-fast: false

    steps:
      - name: Deploy
        run: bash /opt/version-monitor/deploy.sh
