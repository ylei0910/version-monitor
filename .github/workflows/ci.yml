name: CI

on:
  push:
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Check for dependency changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q requirements.txt; then
            echo "::notice::requirements.txt changed — run pip install on target hosts before starting the service"
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Syntax check
        run: |
          python -m py_compile \
            app/__init__.py \
            app/main.py \
            app/config.py \
            app/github.py \
            app/version.py \
            app/notifier.py \
            app/scheduler.py \
            app/database.py \
            app/models.py

      - name: Ruff lint
        run: ruff check app/
